<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VarmeGuiden – Norges beste guide til varmepumper og oppvarming</title>
  <meta name="description" content="VarmeGuiden hjelper deg å velge riktig varmepumpe, spare strøm og finne den beste oppvarmingsløsningen for ditt hjem eller hytte.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: #e05c1a;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    .logo span { color: #1a1a1a; }
    .tagline {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      background: #fff3ee;
      border: 2px solid #e05c1a;
      color: #e05c1a;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #1a1a1a;
    }
    p {
      font-size: 1.05rem;
      color: #666;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Varme<span>Guiden</span></div>
    <div class="tagline">Norges guide til smart oppvarming</div>
    <div class="badge">🔥 KOMMER SNART</div>
    <h1>Vi gjør det enkelt å velge riktig varme</h1>
    <p>VarmeGuiden blir Norges mest komplette guide til varmepumper, hyttevarme, strømsparing og energiløsninger. Vi er snart klare!</p>
  </div>
</body>
</html>
